<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>내일로 역 탐색기</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#111827" />
  <style>
    :root {
      --bg:#020617; --card:#111827; --text:#f8fafc; --muted:#94a3b8;
      --line:rgba(255,255,255,.10); --accent:#38bdf8; --good:#22c55e;
      --pink:#f472b6; --yellow:#facc15;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,#020617,#0f172a); color:var(--text);
      min-height:100vh; padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    }
    .wrap{max-width:760px;margin:0 auto;padding:18px 0 42px}
    h1{font-size:28px;letter-spacing:-.04em;margin:10px 0 4px}
    .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
    .panel{
      background:rgba(17,24,39,.94); border:1px solid var(--line); border-radius:18px;
      padding:16px; position:sticky; top:8px; z-index:5; backdrop-filter:blur(12px);
      box-shadow:0 20px 70px rgba(0,0,0,.35)
    }
    label{display:block;color:var(--muted);font-size:13px;margin-bottom:7px}
    select,input{
      width:100%; border:1px solid var(--line); background:#020617; color:var(--text);
      border-radius:12px; padding:13px 12px; font-size:16px; outline:none;
    }
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    button{
      width:100%;margin-top:12px;border:0;background:var(--accent);color:#00111a;
      font-weight:900;border-radius:14px;padding:14px 16px;font-size:16px
    }
    button.secondary{background:#1f2937;color:var(--text);border:1px solid var(--line)}
    button.rouletteBtn{background:linear-gradient(135deg,var(--pink),var(--yellow));color:#111827}
    .status{color:var(--muted);margin:16px 2px 10px;font-size:14px}
    .card{background:rgba(15,23,42,.92);border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0}
    .top{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
    .station{font-size:20px;font-weight:900}
    .mins{font-size:18px;color:var(--good);font-weight:900;white-space:nowrap}
    .meta{color:var(--muted);font-size:13px;margin-top:4px}
    .path{margin-top:10px;color:#dbeafe;font-size:14px;line-height:1.45}
    details{margin-top:8px}
    summary{color:var(--accent);font-size:13px;cursor:pointer}
    .legs{white-space:pre-wrap;color:#cbd5e1;font-size:12px;line-height:1.5;margin-top:8px}
    .err{color:#fecaca;background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.35);padding:12px;border-radius:12px}

    .randomBox{
      margin:14px 0;padding:16px;border-radius:18px;
      border:1px solid rgba(250,204,21,.28);
      background:linear-gradient(135deg,rgba(244,114,182,.16),rgba(56,189,248,.10));
      box-shadow:0 18px 60px rgba(0,0,0,.28)
    }
    .randomTitle{font-weight:900;font-size:17px;margin-bottom:8px}
    .rouletteName{
      text-align:center;font-size:42px;font-weight:1000;letter-spacing:-.05em;
      padding:24px 8px;color:#fff7ed;text-shadow:0 0 24px rgba(250,204,21,.35);
      min-height:96px;display:flex;align-items:center;justify-content:center
    }
    .countdown{text-align:center;color:var(--yellow);font-size:18px;font-weight:900;margin-top:4px}
    .winner{border-color:rgba(34,197,94,.45);background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(56,189,248,.10))}
    .winner .rouletteName{color:#bbf7d0}
    .confirmRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}

    .selectTools{
      display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px;
    }
    .selectTools button{
      margin-top:0; padding:11px 12px; font-size:14px;
    }
    .checkRow{
      display:grid;
      grid-template-columns:32px 1fr auto;
      gap:10px;
      align-items:center;
    }
    .checkRow input[type="checkbox"]{
      width:22px;height:22px;accent-color:#38bdf8;
    }
    .stationBlock{min-width:0}
    .stationName{font-size:18px;font-weight:900}
    .selectedHint{color:#fde68a;font-weight:800}
    .mutedSmall{font-size:12px;color:var(--muted);margin-top:3px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🚆 내일로 역 탐색기</h1>
    <div class="sub">코레일 운행정보 기반 · 환승 포함 대략 최단 소요시간</div>

    <div class="panel">
      <label>출발역</label>
      <select id="station"></select>
      <div class="grid">
        <div>
          <label>최대 시간(분)</label>
          <input id="minutes" type="number" value="180" min="1" />
        </div>
        <div>
          <label>최대 환승</label>
          <input id="transfer" type="number" value="2" min="0" />
        </div>
      </div>
      <button id="btn">검색</button>
    </div>

    <div id="status" class="status">역 목록 불러오는 중...</div>
    <div id="randomArea"></div>
    <div id="results"></div>
  </div>

<script>
const stationEl=document.getElementById("station");
const minutesEl=document.getElementById("minutes");
const transferEl=document.getElementById("transfer");
const statusEl=document.getElementById("status");
const resultsEl=document.getElementById("results");
const randomArea=document.getElementById("randomArea");
const btn=document.getElementById("btn");

let currentResults = [];
let selectedKeys = new Set();
let rouletteTimer = null;
let countdownTimer = null;

function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function keyOf(r){return `${r.to_station}|${r.duration_minutes}|${r.transfer_count}|${r.path}`;}

async function loadStations(){
  try{
    const res=await fetch("/api/stations");
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    stationEl.innerHTML="";
    data.stations.forEach(s=>{
      const o=document.createElement("option");
      o.value=s; o.textContent=s;
      if(s==="구미") o.selected=true;
      stationEl.appendChild(o);
    });
    statusEl.textContent=`역 ${data.stations.length}개 로드됨`;
  }catch(e){
    statusEl.innerHTML=`<div class="err">${esc(e.message)}</div>`;
  }
}

function selectedResults(){
  return currentResults.filter(r => selectedKeys.has(keyOf(r)));
}

function updateSelectedStatus(){
  const count = selectedResults().length;
  const total = currentResults.length;
  const hint = document.getElementById("selectedHint");
  if(hint) hint.textContent = `랜덤 후보 ${count}/${total}개 선택됨`;

  const btn = document.getElementById("drawBtn");
  if(btn) btn.disabled = count < 1;
}

function toggleOne(key, checked){
  if(checked) selectedKeys.add(key);
  else selectedKeys.delete(key);
  updateSelectedStatus();
}

function selectAll(){
  currentResults.forEach(r => selectedKeys.add(keyOf(r)));
  renderResultsList();
  renderRandomPrompt();
}

function deselectAll(){
  selectedKeys.clear();
  renderResultsList();
  renderRandomPrompt();
}

function renderRandomPrompt(){
  if(!currentResults.length){ randomArea.innerHTML=""; return; }
  const count = selectedResults().length;

  randomArea.innerHTML=`
    <div class="randomBox">
      <div class="randomTitle">🎲 랜덤으로 여행지를 뽑을까요?</div>
      <div class="meta">
        검색 결과 중 체크된 역만 룰렛 후보에 들어갑니다.
        <span class="selectedHint" id="selectedHint">랜덤 후보 ${count}/${currentResults.length}개 선택됨</span>
      </div>
      <div class="selectTools">
        <button class="secondary" onclick="selectAll()">전체 선택</button>
        <button class="secondary" onclick="deselectAll()">전체 해제</button>
      </div>
      <div class="confirmRow">
        <button class="rouletteBtn" id="drawBtn" onclick="startRoulette()" ${count < 1 ? "disabled" : ""}>Y · 뽑기</button>
        <button class="secondary" onclick="cancelRoulette()">N · 안 뽑기</button>
      </div>
    </div>
  `;
}

function cancelRoulette(){ stopTimers(); randomArea.innerHTML=""; }
function stopTimers(){
  if(rouletteTimer){ clearInterval(rouletteTimer); rouletteTimer=null; }
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; }
}
function randomItem(candidates){
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function startRoulette(){
  const candidates = selectedResults();
  if(!candidates.length){
    alert("랜덤 후보를 최소 1개 이상 체크하세요.");
    return;
  }

  stopTimers();
  randomArea.innerHTML=`
    <div class="randomBox">
      <div class="randomTitle">🎲 여행지 추첨중...</div>
      <div class="rouletteName" id="rouletteName">준비</div>
      <div class="countdown" id="countdown">5</div>
    </div>
  `;

  const nameEl=document.getElementById("rouletteName");
  const countEl=document.getElementById("countdown");
  let remaining=5;

  rouletteTimer=setInterval(()=>{
    const item=randomItem(candidates);
    nameEl.textContent=item.to_station;
  },70);

  countdownTimer=setInterval(()=>{
    remaining-=1;
    countEl.textContent=remaining;
    if(remaining<=0) finishRoulette(candidates);
  },1000);
}

function finishRoulette(candidates){
  stopTimers();
  const winner=randomItem(candidates);
  randomArea.innerHTML=`
    <div class="randomBox winner">
      <div class="randomTitle">🎉 오늘의 여행지는</div>
      <div class="rouletteName">${esc(winner.to_station)}</div>
      <div class="card">
        <div class="top">
          <div class="station">${esc(winner.to_station)}</div>
          <div class="mins">${esc(winner.duration_minutes)}분</div>
        </div>
        <div class="meta">환승 ${esc(winner.transfer_count)}회 · 탑승 ${esc(winner.ride_count)}회</div>
        <div class="path">${esc(winner.path)}</div>
        ${winner.legs ? `<details open><summary>상세 경로</summary><div class="legs">${esc(winner.legs)}</div></details>` : ""}
      </div>
      <button class="rouletteBtn" onclick="startRoulette()">다시 뽑기</button>
    </div>
  `;
}

function renderResultsList(){
  if(!currentResults.length){
    resultsEl.innerHTML=`<div class="card">조건에 맞는 역이 없습니다.</div>`;
    return;
  }

  resultsEl.innerHTML=currentResults.map((r, idx)=>{
    const key = keyOf(r);
    const checked = selectedKeys.has(key) ? "checked" : "";
    return `
      <div class="card">
        <div class="checkRow">
          <input type="checkbox" ${checked} onchange="toggleOne('${esc(key)}', this.checked)" />
          <div class="stationBlock">
            <div class="stationName">${esc(r.to_station)}</div>
            <div class="meta">환승 ${esc(r.transfer_count)}회 · 탑승 ${esc(r.ride_count)}회</div>
          </div>
          <div class="mins">${esc(r.duration_minutes)}분</div>
        </div>
        <div class="path">${esc(r.path)}</div>
        ${r.legs ? `<details><summary>상세 경로</summary><div class="legs">${esc(r.legs)}</div></details>` : ""}
      </div>
    `;
  }).join("");
}

function render(data){
  currentResults=data.results||[];
  selectedKeys = new Set(currentResults.map(keyOf));
  statusEl.textContent=`${data.from_station}에서 ${data.minutes}분 이내: ${data.count}개 역`;
  renderRandomPrompt();
  renderResultsList();
}

async function search(){
  stopTimers();
  randomArea.innerHTML="";
  const params=new URLSearchParams({
    from_station: stationEl.value,
    minutes: minutesEl.value || "180",
    max_transfer: transferEl.value || "2"
  });
  statusEl.textContent="검색 중...";
  resultsEl.innerHTML="";
  try{
    const res=await fetch(`/api/search?${params.toString()}`);
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    render(data);
  }catch(e){
    statusEl.innerHTML=`<div class="err">${esc(e.message)}</div>`;
  }
}
btn.addEventListener("click",search);
if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});}
loadStations();
</script>
</body>
</html>
