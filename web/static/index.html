<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>내일로 역 탐색기</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#111827">
  <style>
    :root{
      --bg:#020617;--panel:#111827;--card:#0f172a;--text:#f8fafc;
      --muted:#94a3b8;--line:rgba(255,255,255,.10);--accent:#38bdf8;
      --green:#22c55e;--pink:#f472b6;--yellow:#facc15;
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,#020617,#0f172a);
      padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    }
    .wrap{max-width:760px;margin:0 auto;padding:18px 0 42px}
    h1{margin:8px 0 4px;font-size:28px;letter-spacing:-.04em}
    .subtitle{margin-bottom:18px;color:var(--muted);font-size:14px}
    .panel,.random-panel,.result-card{
      background:rgba(15,23,42,.94);border:1px solid var(--line);
      border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.28);
    }
    .panel{padding:16px;position:sticky;top:8px;z-index:20;backdrop-filter:blur(12px)}
    label{display:block;margin-bottom:7px;color:var(--muted);font-size:13px}
    input,select{
      width:100%;border:1px solid var(--line);border-radius:12px;
      background:#020617;color:var(--text);padding:13px 12px;font-size:16px;
    }
    button{
      width:100%;margin-top:12px;border:0;border-radius:14px;
      padding:14px 16px;font-size:16px;font-weight:900;
      background:var(--accent);color:#00111a;cursor:pointer;
    }
    button.secondary{background:#1f2937;color:var(--text);border:1px solid var(--line)}
    button.roulette{background:linear-gradient(135deg,var(--pink),var(--yellow));color:#111827}
    button:disabled{opacity:.45;cursor:not-allowed}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .input-wrap{position:relative}
    .suggestions{
      display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
      max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch;
      background:#020617;border:1px solid var(--line);border-radius:14px;
      box-shadow:0 20px 60px rgba(0,0,0,.45);z-index:100;
    }
    .suggestion{padding:13px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
    .suggestion:last-child{border-bottom:0}
    .suggestion:active{background:rgba(56,189,248,.18)}
    .hint{margin-top:5px;color:var(--muted);font-size:12px}
    .status{margin:16px 2px 10px;color:var(--muted);font-size:14px}
    .error{padding:12px;border-radius:12px;color:#fecaca;background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.35)}
    .random-panel{padding:16px;margin:14px 0}
    .random-title{font-size:17px;font-weight:900}
    .filter-group{margin-top:12px}
    .filter-toggle{
      display:flex;align-items:center;justify-content:space-between;
      margin:0;background:#1f2937;color:var(--text);border:1px solid var(--line);
      padding:11px 12px;border-radius:12px;font-size:14px;
    }
    .filter-body{display:none;padding-top:10px}
    .filter-body.open{display:block}
    .filter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    @media(max-width:520px){.filter-grid{grid-template-columns:repeat(2,1fr)}}
    .chip{
      display:flex;align-items:center;gap:7px;padding:9px;
      border-radius:999px;background:#020617;border:1px solid var(--line);
      font-size:13px;
    }
    .chip input{width:17px;height:17px;accent-color:var(--pink)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .result-card{padding:14px;margin:10px 0}
    .result-head{display:grid;grid-template-columns:32px 1fr auto;gap:10px;align-items:center}
    .result-head input{width:22px;height:22px;accent-color:var(--accent)}
    .station{font-size:19px;font-weight:900}
    .minutes{font-size:18px;font-weight:900;color:var(--green)}
    .meta{margin-top:4px;color:var(--muted);font-size:13px}
    .path{margin-top:10px;color:#dbeafe;font-size:14px;line-height:1.45}
    summary{margin-top:8px;color:var(--accent);font-size:13px;cursor:pointer}
    .legs{margin-top:8px;white-space:pre-wrap;color:#cbd5e1;font-size:12px;line-height:1.5}
    .region-tag{color:#a7f3d0;font-size:12px}
    .excluded{opacity:.48}
    .roulette-box{
      min-height:118px;display:flex;align-items:center;justify-content:center;
      font-size:42px;font-weight:1000;text-align:center;color:#fff7ed;
      text-shadow:0 0 24px rgba(250,204,21,.35);
    }
    .countdown{text-align:center;color:var(--yellow);font-size:18px;font-weight:900}
  </style>
</head>
<body>
<div class="wrap">
  <h1>🚆 내일로 역 탐색기</h1>
  <div class="subtitle">코레일 운행정보 기반 · 환승 포함 최단경로</div>

  <section class="panel">
    <label for="stationInput">출발역</label>
    <div class="input-wrap">
      <input id="stationInput" placeholder="예: 구미, 서울, 부산" autocomplete="off">
      <div id="suggestions" class="suggestions"></div>
    </div>
    <div class="hint">역 이름 일부만 입력하면 후보가 표시됩니다.</div>

    <div class="grid">
      <div>
        <label for="minutesInput">최대 시간(분)</label>
        <input id="minutesInput" type="number" min="1" value="180">
      </div>
      <div>
        <label for="transferInput">최대 환승</label>
        <input id="transferInput" type="number" min="0" value="2">
      </div>
    </div>

    <button id="searchButton">검색</button>
  </section>

  <div id="status" class="status">역 목록 불러오는 중...</div>
  <div id="randomArea"></div>
  <div id="results"></div>
</div>

<script>
"use strict";

const stationInput = document.getElementById("stationInput");
const minutesInput = document.getElementById("minutesInput");
const transferInput = document.getElementById("transferInput");
const searchButton = document.getElementById("searchButton");
const suggestions = document.getElementById("suggestions");
const statusArea = document.getElementById("status");
const randomArea = document.getElementById("randomArea");
const resultsArea = document.getElementById("results");

let stations = [];
let results = [];
let selectedKeys = new Set();
let excludedRegions = new Set();
let excludedTrainTypes = new Set();
let rouletteInterval = null;
let countdownInterval = null;

const REGION_MAP = {
  "서울":["서울","용산","영등포","청량리","왕십리","옥수","상봉","수서"],
  "경기":["수원","평택","안양","광명","행신","부천","의정부","덕소","양평","용문","가평","청평","마석","오산","서정리","이천","부발","여주","곤지암","연천"],
  "인천":["인천","검암","계양","영종","운서","인천공항"],
  "강원":["춘천","강촌","강릉","정동진","묵호","동해","삼척","태백","철암","도계","원주","서원주","만종","횡성","평창","진부","영월"],
  "충북":["오송","청주","청주공항","충주","제천","단양","영동","옥천","음성","증평","봉양","감곡장호원"],
  "충남":["천안","천안아산","아산","온양온천","예산","홍성","광천","대천","웅천","장항","서천","논산","강경","계룡","공주"],
  "대전":["대전","서대전","신탄진"],
  "세종":["조치원","부강","전의"],
  "전북":["전주","익산","군산","김제","정읍","남원","임실","오수","삼례","대야"],
  "전남":["목포","나주","무안","함평","장성","순천","여수엑스포","여천","벌교","보성","득량","화순","구례구","곡성","광양"],
  "광주":["광주송정","광주","효천","극락강","서광주"],
  "경북":["김천","김천구미","구미","왜관","경산","영천","하양","포항","경주","안동","영주","풍기","예천","점촌","상주","문경","의성","청도","봉화","영덕"],
  "경남":["창원","창원중앙","마산","진주","진영","밀양","삼랑진","원동","물금","양산","북천","하동","함안","중리","반성"],
  "대구":["동대구","대구","서대구"],
  "울산":["울산","태화강","남창","덕하","북울산"],
  "부산":["부산","구포","사상","부전","신해운대","센텀","기장","화명"]
};

const REGION_ORDER = [
  "서울","경기","인천","강원","충북","충남","대전","세종",
  "전북","전남","광주","경북","경남","대구","울산","부산","미분류"
];

const TRAIN_TYPES = [
  ["KTX","KTX·KTX-산천"],
  ["ITX-새마을","ITX-새마을"],
  ["ITX-마음","ITX-마음"],
  ["ITX-청춘","ITX-청춘"],
  ["새마을호","새마을호"],
  ["무궁화호","무궁화호"],
  ["누리로","누리로"],
  ["미확인","차종 미확인"]
];

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function routeKey(item) {
  return `${item.to_station}|${item.duration_minutes}|${item.transfer_count}|${item.path}`;
}

function regionOf(stationName) {
  for (const [region, names] of Object.entries(REGION_MAP)) {
    if (names.includes(stationName)) return region;
  }
  return "미분류";
}

function isRegionExcluded(item) {
  return excludedRegions.has(regionOf(item.to_station));
}

function candidateResults() {
  return results.filter(item =>
    selectedKeys.has(routeKey(item)) && !isRegionExcluded(item)
  );
}

function stopRouletteTimers() {
  if (rouletteInterval) clearInterval(rouletteInterval);
  if (countdownInterval) clearInterval(countdownInterval);
  rouletteInterval = null;
  countdownInterval = null;
}

function scrollRandomArea() {
  requestAnimationFrame(() => {
    randomArea.scrollIntoView({behavior:"smooth", block:"center"});
  });
}

async function loadStations() {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 8000);

  try {
    const response = await fetch("/api/stations", {
      signal: controller.signal,
      cache: "no-store"
    });
    const data = await response.json();

    if (!response.ok || data.error) {
      throw new Error(data.error || `HTTP ${response.status}`);
    }

    stations = data.stations || [];
    stationInput.value = "";
    statusArea.textContent = `역 ${stations.length}개 로드됨`;
  } catch (error) {
    const message = error.name === "AbortError"
      ? "역 목록 요청 시간이 초과되었습니다."
      : error.message;
    statusArea.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
  } finally {
    clearTimeout(timer);
  }
}

function renderSuggestions() {
  const query = stationInput.value.trim();

  if (!query) {
    suggestions.style.display = "none";
    suggestions.innerHTML = "";
    return;
  }

  const matches = stations
    .filter(station => station.includes(query))
    .slice(0, 80);

  suggestions.innerHTML = matches.length
    ? matches.map(station =>
        `<div class="suggestion" data-station="${escapeHtml(station)}">${escapeHtml(station)}</div>`
      ).join("")
    : `<div class="suggestion">후보 없음</div>`;

  suggestions.style.display = "block";
}

function toggleFilter(id) {
  document.getElementById(id)?.classList.toggle("open");
}

function toggleRegion(region, checked) {
  if (checked) excludedRegions.add(region);
  else excludedRegions.delete(region);

  renderRandomPanel();
  renderResults();
}

function toggleTrainType(trainType, checked) {
  if (checked) excludedTrainTypes.add(trainType);
  else excludedTrainTypes.delete(trainType);

  performSearch();
}

function toggleRoute(key, checked) {
  if (checked) selectedKeys.add(key);
  else selectedKeys.delete(key);
  updateCandidateCount();
}

function selectAllRoutes() {
  results.forEach(item => {
    if (!isRegionExcluded(item)) selectedKeys.add(routeKey(item));
  });
  renderRandomPanel();
  renderResults();
}

function deselectAllRoutes() {
  selectedKeys.clear();
  renderRandomPanel();
  renderResults();
}

function updateCandidateCount() {
  const label = document.getElementById("candidateCount");
  const drawButton = document.getElementById("drawButton");
  const count = candidateResults().length;

  if (label) label.textContent = `랜덤 후보 ${count}/${results.length}개`;
  if (drawButton) drawButton.disabled = count === 0;
}

function renderRandomPanel() {
  if (!results.length) {
    randomArea.innerHTML = "";
    return;
  }

  randomArea.innerHTML = `
    <section class="random-panel">
      <div class="random-title">🎲 랜덤 여행지</div>
      <div id="candidateCount" class="meta"></div>

      <div class="filter-group">
        <button class="filter-toggle secondary" onclick="toggleFilter('regionFilters')">
          <span>🗺️ 지역 제외 옵션</span><span>⌄</span>
        </button>
        <div id="regionFilters" class="filter-body">
          <div class="filter-grid">
            ${REGION_ORDER.map(region => `
              <label class="chip">
                <input type="checkbox"
                  ${excludedRegions.has(region) ? "checked" : ""}
                  onchange="toggleRegion('${region}', this.checked)">
                ${region}
              </label>
            `).join("")}
          </div>
        </div>
      </div>

      <div class="filter-group">
        <button class="filter-toggle secondary" onclick="toggleFilter('trainFilters')">
          <span>🚄 열차 제외 옵션</span><span>⌄</span>
        </button>
        <div id="trainFilters" class="filter-body">
          <div class="filter-grid">
            ${TRAIN_TYPES.map(([value,label]) => `
              <label class="chip">
                <input type="checkbox"
                  ${excludedTrainTypes.has(value) ? "checked" : ""}
                  onchange="toggleTrainType('${value}', this.checked)">
                ${label}
              </label>
            `).join("")}
          </div>
          <div class="hint">체크한 차종을 제거하고 남은 열차로 경로를 다시 계산합니다.</div>
        </div>
      </div>

      <div class="actions">
        <button class="secondary" onclick="selectAllRoutes()">전체 선택</button>
        <button class="secondary" onclick="deselectAllRoutes()">전체 해제</button>
      </div>

      <button id="drawButton" class="roulette" onclick="startRoulette()">🎰 랜덤 뽑기</button>
    </section>
  `;

  updateCandidateCount();
}

function renderResults() {
  if (!results.length) {
    resultsArea.innerHTML = `<div class="result-card">조건에 맞는 역이 없습니다.</div>`;
    return;
  }

  resultsArea.innerHTML = results.map(item => {
    const key = routeKey(item);
    const excluded = isRegionExcluded(item);
    const checked = selectedKeys.has(key) && !excluded;

    return `
      <article class="result-card ${excluded ? "excluded" : ""}">
        <div class="result-head">
          <input type="checkbox"
            ${checked ? "checked" : ""}
            ${excluded ? "disabled" : ""}
            onchange="toggleRoute('${escapeHtml(key)}', this.checked)">
          <div>
            <div class="station">
              ${escapeHtml(item.to_station)}
              <span class="region-tag">${escapeHtml(regionOf(item.to_station))}</span>
            </div>
            <div class="meta">
              환승 ${item.transfer_count}회 · 탑승 ${item.ride_count}회 ·
              ${escapeHtml(item.used_train_types || "차종 미확인")}
            </div>
          </div>
          <div class="minutes">${item.duration_minutes}분</div>
        </div>

        <div class="path">${escapeHtml(item.path)}</div>

        ${item.legs ? `
          <details>
            <summary>상세 경로</summary>
            <div class="legs">${escapeHtml(item.legs)}</div>
          </details>
        ` : ""}
      </article>
    `;
  }).join("");
}

function randomItem(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function startRoulette() {
  const candidates = candidateResults();

  if (!candidates.length) {
    alert("랜덤 후보를 최소 1개 이상 선택하세요.");
    return;
  }

  stopRouletteTimers();

  randomArea.innerHTML = `
    <section class="random-panel">
      <div class="random-title">🎰 여행지 추첨 중...</div>
      <div id="rouletteName" class="roulette-box">준비</div>
      <div id="countdown" class="countdown">5</div>
    </section>
  `;

  scrollRandomArea();

  const nameArea = document.getElementById("rouletteName");
  const countdownArea = document.getElementById("countdown");
  let remaining = 5;

  rouletteInterval = setInterval(() => {
    nameArea.textContent = randomItem(candidates).to_station;
  }, 70);

  countdownInterval = setInterval(() => {
    remaining -= 1;
    countdownArea.textContent = String(remaining);

    if (remaining <= 0) {
      finishRoulette(candidates);
    }
  }, 1000);
}

function finishRoulette(candidates) {
  stopRouletteTimers();

  const winner = randomItem(candidates);

  randomArea.innerHTML = `
    <section class="random-panel">
      <div class="random-title">🎉 오늘의 여행지</div>
      <div class="roulette-box">${escapeHtml(winner.to_station)}</div>

      <article class="result-card">
        <div class="result-head">
          <div></div>
          <div>
            <div class="station">${escapeHtml(winner.to_station)}</div>
            <div class="meta">
              환승 ${winner.transfer_count}회 · 탑승 ${winner.ride_count}회 ·
              ${escapeHtml(winner.used_train_types || "차종 미확인")}
            </div>
          </div>
          <div class="minutes">${winner.duration_minutes}분</div>
        </div>

        <div class="path">${escapeHtml(winner.path)}</div>

        ${winner.legs ? `
          <details open>
            <summary>상세 경로</summary>
            <div class="legs">${escapeHtml(winner.legs)}</div>
          </details>
        ` : ""}
      </article>

      <button class="roulette" onclick="startRoulette()">다시 뽑기</button>
    </section>
  `;

  scrollRandomArea();
}

async function performSearch() {
  stopRouletteTimers();

  const fromStation = stationInput.value.trim();

  if (!fromStation) {
    statusArea.innerHTML = `<div class="error">출발역을 입력하세요.</div>`;
    return;
  }

  if (!stations.includes(fromStation)) {
    const matches = stations.filter(station => station.includes(fromStation)).slice(0,5);
    const hint = matches.length ? ` 혹시 ${matches.join(", ")} 중 하나인가요?` : "";
    statusArea.innerHTML = `<div class="error">역 목록에 없는 출발역입니다.${escapeHtml(hint)}</div>`;
    return;
  }

  statusArea.textContent = "검색 중...";
  randomArea.innerHTML = "";
  resultsArea.innerHTML = "";

  const params = new URLSearchParams({
    from_station: fromStation,
    minutes: minutesInput.value || "180",
    max_transfer: transferInput.value || "2",
    excluded_train_types: [...excludedTrainTypes].join(",")
  });

  try {
    const response = await fetch(`/api/search?${params.toString()}`, {cache:"no-store"});
    const data = await response.json();

    if (!response.ok || data.error) {
      throw new Error(data.error || `HTTP ${response.status}`);
    }

    results = data.results || [];
    selectedKeys = new Set(results.map(routeKey));

    const excludedText = data.excluded_train_types?.length
      ? ` · 제외: ${data.excluded_train_types.join(", ")}`
      : "";

    statusArea.textContent =
      `${data.from_station}에서 ${data.minutes}분 이내${excludedText}: ${data.count}개 역`;

    renderRandomPanel();
    renderResults();
  } catch (error) {
    statusArea.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
  }
}

stationInput.addEventListener("input", renderSuggestions);
stationInput.addEventListener("focus", renderSuggestions);
stationInput.addEventListener("keydown", event => {
  if (event.key === "Enter") performSearch();
});

suggestions.addEventListener("click", event => {
  const item = event.target.closest("[data-station]");
  if (!item) return;
  stationInput.value = item.dataset.station;
  suggestions.style.display = "none";
});

document.addEventListener("click", event => {
  if (!event.target.closest(".input-wrap")) {
    suggestions.style.display = "none";
  }
});

searchButton.addEventListener("click", performSearch);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}

loadStations();
</script>
</body>
</html>
