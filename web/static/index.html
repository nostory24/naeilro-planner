<html lang="ko">

  <style>

    .checkRow{display:grid;grid-template-columns:32px 1fr auto;gap:10px;align-items:center}.checkRow input[type="checkbox"]{width:22px;height:22px;accent-color:#38bdf8}.stationName{font-size:18px;font-weight:900}.selectedHint{color:#fde68a;font-weight:800}.regionBadge{color:#a7f3d0;font-size:12px;margin-left:4px}
    .filterGroup{margin-top:12px;border-top:1px solid rgba(255,255,255,.10);padding-top:10px}.filterToggle{display:flex;align-items:center;justify-content:space-between;width:100%;margin:0;background:#1f2937;color:var(--text);border:1px solid var(--line);padding:11px 12px;border-radius:12px;font-size:14px}.filterToggle .arrow{transition:transform .2s ease}.filterToggle.open .arrow{transform:rotate(180deg)}.filterBody{display:none;padding-top:10px}.filterBody.open{display:block}.trainExclude{margin-top:0;padding-top:0;border-top:0}.trainOption{display:flex;align-items:center;gap:8px;background:rgba(2,6,23,.62);border:1px solid var(--line);border-radius:12px;padding:11px 12px;font-size:14px}.trainOption input{width:18px;height:18px;accent-color:#facc15}.regionExclude{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.10)}.regionTitle{font-size:13px;color:#fde68a;font-weight:900;margin-bottom:8px}.regionGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}@media(max-width:520px){.regionGrid{grid-template-columns:repeat(3,1fr)}}
    .regionChip{display:flex;align-items:center;gap:6px;background:rgba(2,6,23,.62);border:1px solid var(--line);border-radius:999px;padding:8px 9px;font-size:13px;color:#e5e7eb}.regionChip input{width:16px;height:16px;accent-color:#f472b6}.excludedCard{opacity:.48}.excludedNote{color:#fca5a5;font-size:12px;margin-top:3px}
  </style>
</head>
<body>
<div class="wrap">
  <h1>🚆 내일로 역 탐색기</h1><div class="sub">코레일 운행정보 기반 · 환승 포함 대략 최단 소요시간</div>
  <div class="panel">
    <label>출발역</label><div class="inputWrap"><input id="stationInput" placeholder="예: 구미, 서울, 부산" autocomplete="off" /><div id="suggestBox" class="suggestBox"></div></div>
    <div class="mutedSmall">역 이름 일부만 입력하면 스크롤 가능한 후보가 표시됩니다.</div>
    <div class="grid">
      <div><label>최대 시간(분)</label><input id="minutes" type="number" value="180" min="1" /></div>
      <div><label>최대 환승</label><input id="transfer" type="number" value="2" min="0" /></div>
    </div><button id="btn">검색</button>

</div>
<script>
const stationInput=document.getElementById("stationInput"),suggestBox=document.getElementById("suggestBox"),minutesEl=document.getElementById("minutes"),transferEl=document.getElementById("transfer"),statusEl=document.getElementById("status"),resultsEl=document.getElementById("results"),randomArea=document.getElementById("randomArea"),btn=document.getElementById("btn");
let allStations=[],currentResults=[],selectedKeys=new Set(),excludedRegions=new Set(),excludedTrainTypes=new Set(),rouletteTimer=null,countdownTimer=null;
const REGION_MAP={

"인천":["인천","검암","계양","영종","운서","청라국제도시","인천공항"],
"강원":["춘천","남춘천","강촌","백양리","김유정","강릉","정동진","묵호","동해","삼척","태백","철암","도계","원주","서원주","만종","횡성","둔내","평창","진부","추암","망상","옥계","동백산","신기","고한","사북","민둥산","영월","쌍룡","예미"],
"충북":["오송","청주","청주공항","충주","제천","단양","영동","옥천","음성","증평","봉양","대소","감곡장호원","주덕","삼탄","목행","앙성온천","도안","괴산","연풍"],

"전북":["전주","익산","군산","김제","정읍","남원","임실","오수","삼례","대야","신태인","백양사","함열","황등","서전주","동산","관촌","운암","산성"],
"전남":["목포","나주","무안","함평","영광","장성","순천","여수엑스포","여천","벌교","보성","득량","화순","구례구","곡성","몽탄","일로","다시","능주","명봉","이양","개태사","압록","석곡","구성","옥곡","광양","진상","하동"],
"광주":["광주송정","광주","효천","극락강","서광주","송정리"],
"경북":["김천","김천구미","구미","왜관","경산","영천","하양","포항","서경주","경주","안동","영주","풍기","예천","점촌","상주","문경","의성","청도","상동","남성현","신경주","아화","신녕","화산","북영천","탑리","군위","우보","화본","봉화","춘양","분천","양원","승부","석포","현동","임기","영덕","강구","장사","월포","청하","안강"],
"경남":["창원","창원중앙","마산","진주","진영","밀양","삼랑진","원동","물금","양산","북천","하동","함안","중리","반성","완사","군북","한림정","진례"],
"대구":["동대구","대구","서대구","신암"],
"울산":["울산","태화강","남창","덕하","호계","북울산","서생"],
"부산":["부산","구포","사상","부전","신해운대","센텀","기장","좌천","월내","송정","일광","재송","동래","화명"]
};
const REGION_HINTS=[
["서울",["서울"]],
["부산",["부산","해운대","센텀","기장","구포","사상","부전","동래","화명"]],
["대구",["대구"]],
["대전",["대전"]],
["광주",["광주"]],
["울산",["울산","태화강"]],
["인천",["인천","검암","계양","영종","운서"]],
["세종",["조치원","부강","전의","소정리"]],
["경기",["수원","평택","안양","광명","행신","양평","용문","가평","청평","이천","부발","여주","곤지암","덕소","팔당","양수","연천","전곡","의정부"]],
["강원",["강릉","춘천","원주","동해","삼척","태백","정동진","묵호","횡성","평창","진부","도계","철암","만종","고한","사북","영월"]],
["충북",["오송","청주","충주","제천","단양","영동","옥천","음성","증평","봉양","대소","감곡"]],
["충남",["천안","아산","온양","예산","홍성","광천","대천","웅천","장항","서천","논산","강경","계룡","공주"]],
["전북",["전주","익산","군산","김제","정읍","남원","임실","오수","삼례","대야"]],
["전남",["목포","나주","무안","함평","영광","장성","순천","여수","여천","벌교","보성","득량","화순","구례","곡성","광양"]],
["경북",["김천","구미","왜관","경산","영천","하양","포항","경주","안동","영주","풍기","예천","점촌","상주","문경","의성","청도","봉화","영덕"]],
["경남",["창원","마산","진주","진영","밀양","삼랑진","원동","물금","양산","북천","하동","함안","중리","반성"]]
];
const REGION_ORDER=["서울","경기","인천","강원","충북","충남","대전","세종","전북","전남","광주","경북","경남","대구","울산","부산","미분류"];
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function keyOf(r){return `${r.to_station}|${r.duration_minutes}|${r.transfer_count}|${r.path}`;} function regionOf(s){
  for(const [r,n] of Object.entries(REGION_MAP)){if(n.includes(s))return r;}
  for(const [r,keywords] of REGION_HINTS){if(keywords.some(k=>s.includes(k)))return r;}
  return "미분류";
} function isExcluded(r){return excludedRegions.has(regionOf(r.to_station));}
async function loadStations(){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),8000);

  try{
    const res=await fetch("/api/stations",{signal:controller.signal,cache:"no-store"});
    const data=await res.json();

    if(!res.ok || data.error){
      throw new Error(data.error || `HTTP ${res.status}`);
    }

    allStations=data.stations || [];
    stationInput.value="";
    statusEl.textContent=`역 ${allStations.length}개 로드됨`;
  }catch(e){
    const message=e.name==="AbortError"
      ? "역 목록 요청이 8초를 넘겼습니다. /api/db-check를 확인하세요."
      : e.message;
    statusEl.innerHTML=`<div class="err">${esc(message)}</div>`;
  }finally{
    clearTimeout(timer);
  }
}
function showSuggestions(){const q=stationInput.value.trim();if(!q){suggestBox.style.display="none";suggestBox.innerHTML="";return;}const m=allStations.filter(s=>s.includes(q)).slice(0,80);suggestBox.innerHTML=m.length?m.map(s=>`<div class="suggestItem" onclick="pickStation('${esc(s)}')">${esc(s)}</div>`).join(""):`<div class="suggestItem">후보 없음</div>`;suggestBox.style.display="block";} function pickStation(s){stationInput.value=s;suggestBox.style.display="none";}
document.addEventListener("click",e=>{if(!e.target.closest(".inputWrap"))suggestBox.style.display="none";});stationInput.addEventListener("input",showSuggestions);stationInput.addEventListener("focus",showSuggestions);
function selectedResults(){return currentResults.filter(r=>selectedKeys.has(keyOf(r))&&!isExcluded(r));}
function syncExcludedSelection(){
  currentResults.forEach(r=>{
    if(isExcluded(r)) selectedKeys.delete(keyOf(r));
  });
});
}
function updateSelectedStatus(){syncExcludedSelection();const c=selectedResults().length,t=currentResults.length,h=document.getElementById("selectedHint");const ex=[...excludedRegions].join(", ");if(h)h.textContent=`랜덤 후보 ${c}/${t}개 선택됨${ex?` · 제외: ${ex}`:""}`;const d=document.getElementById("drawBtn");if(d)d.disabled=c<1;}
function toggleOne(k,c){if(c)selectedKeys.add(k);else selectedKeys.delete(k);updateSelectedStatus();}
function toggleTrainType(type, checked){
  if(checked) excludedTrainTypes.add(type);
  else excludedTrainTypes.delete(type);
  search();
}
function toggleRegion(r,c){
  if(c){
    excludedRegions.add(r);
    syncExcludedSelection();
  }else{
    excludedRegions.delete(r);
    currentResults.forEach(item=>{if(regionOf(item.to_station)===r)selectedKeys.add(keyOf(item));});
    syncExcludedSelection();
  }
  renderResultsList();
  renderRandomPrompt();
}
function selectAll(){currentResults.forEach(r=>{if(!isExcluded(r))selectedKeys.add(keyOf(r));});renderResultsList();renderRandomPrompt();}
function deselectAll(){selectedKeys.clear();renderResultsList();renderRandomPrompt();}
function toggleFilterBody(id, button){
  const body=document.getElementById(id);
  if(!body)return;
  const open=!body.classList.contains("open");
  body.classList.toggle("open",open);
  button.classList.toggle("open",open);
}
function renderTrainExclude(){
  const types=[
    ["KTX","KTX·KTX-산천"],
    ["ITX-새마을","ITX-새마을"],
    ["ITX-마음","ITX-마음"],
    ["ITX-청춘","ITX-청춘"],
    ["새마을호","새마을호"],
    ["무궁화호","무궁화호"],
    ["누리로","누리로"],
    ["미확인","차종 미확인"]
  ];

  return `<div class="filterGroup">
    <button class="filterToggle" onclick="toggleFilterBody('trainFilterBody',this)">
      <span>🚄 열차 제외 옵션</span><span class="arrow">⌄</span>
    </button>
    <div id="trainFilterBody" class="filterBody">
      <div class="trainExclude">
        <div class="regionTitle">제외할 열차 종류</div>
        <div class="regionGrid">
          ${types.map(([value,label])=>`
            <label class="regionChip">
              <input type="checkbox"
                ${excludedTrainTypes.has(value)?"checked":""}
                onchange="toggleTrainType('${value}',this.checked)" />
              ${label}
            </label>`).join("")}
        </div>
        <div class="mutedSmall">
          체크한 열차 운행편만 제거하고, 남은 열차로 목적지와 최단경로를 다시 계산합니다.
        </div>
      </div>
    </div>
  </div>`;
}
function renderRegionExclude(){return `<div class="filterGroup">
  <button class="filterToggle" onclick="toggleFilterBody('regionFilterBody',this)">
    <span>🗺️ 지역 제외 옵션</span><span class="arrow">⌄</span>
  </button>
  <div id="regionFilterBody" class="filterBody"><div class="regionExclude"><div class="regionExclude"><div class="regionTitle">랜덤 제외 지역</div><div class="regionGrid">${REGION_ORDER.map(r=>`<label class="regionChip"><input type="checkbox" ${excludedRegions.has(r)?"checked":""} onchange="toggleRegion('${r}',this.checked)" />${r}</label>`).join("")}</div><div class="mutedSmall">예: 서울을 체크하면 서울 지역 역은 랜덤 후보에서 제외되고, 다시 체크 해제하면 후보로 돌아옵니다.</div></div></div></div>`;}
function renderRandomPrompt(){if(!currentResults.length){randomArea.innerHTML="";return;}syncExcludedSelection();const c=selectedResults().length;randomArea.innerHTML=`<div class="randomBox"><div class="randomTitle">🎲 랜덤으로 여행지를 뽑을까요?</div><div class="meta">체크된 역 중, 제외 지역이 아닌 역만 룰렛 후보에 들어갑니다. <span class="selectedHint" id="selectedHint">랜덤 후보 ${c}/${currentResults.length}개 선택됨</span></div>${renderRegionExclude()}${renderTrainExclude()}<div class="selectTools"><button class="secondary" onclick="selectAll()">전체 선택</button><button class="secondary" onclick="deselectAll()">전체 해제</button></div><div class="confirmRow"><button class="rouletteBtn" id="drawBtn" onclick="startRoulette()" ${c<1?"disabled":""}>Y · 뽑기</button><button class="secondary" onclick="cancelRoulette()">N · 안 뽑기</button></div></div>`;updateSelectedStatus();}
function cancelRoulette(){stopTimers();randomArea.innerHTML="";}function stopTimers(){if(rouletteTimer){clearInterval(rouletteTimer);rouletteTimer=null;}if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}} function randomItem(a){return a[Math.floor(Math.random()*a.length)];}
function scrollRouletteIntoView(){
  requestAnimationFrame(()=>{
    const box=randomArea.querySelector(".randomBox");
    if(box){
      box.scrollIntoView({behavior:"smooth",block:"center"});
    }
  });
}
function startRoulette(){const c=selectedResults();if(!c.length){alert("랜덤 후보를 최소 1개 이상 체크하세요.");return;}stopTimers();randomArea.innerHTML=`<div class="randomBox"><div class="randomTitle">🎲 여행지 추첨중...</div><div class="rouletteName" id="rouletteName">준비</div><div class="countdown" id="countdown">5</div></div>`;scrollRouletteIntoView();const n=document.getElementById("rouletteName"),co=document.getElementById("countdown");let r=5;rouletteTimer=setInterval(()=>{n.textContent=randomItem(c).to_station;},70);countdownTimer=setInterval(()=>{r-=1;co.textContent=r;if(r<=0)finishRoulette(c);},1000);}
function finishRoulette(c){stopTimers();const w=randomItem(c);randomArea.innerHTML=`<div class="randomBox winner"><div class="randomTitle">🎉 오늘의 여행지는</div><div class="rouletteName">${esc(w.to_station)}</div><div class="card"><div class="top"><div class="station">${esc(w.to_station)}</div><div class="mins">${esc(w.duration_minutes)}분</div></div><div class="meta">지역 ${esc(regionOf(w.to_station))} · 열차 ${esc(w.used_train_types||"미확인")} · 환승 ${esc(w.transfer_count)}회 · 탑승 ${esc(w.ride_count)}회</div><div class="path">${esc(w.path)}</div>${w.legs?`<details open><summary>상세 경로</summary><div class="legs">${esc(w.legs)}</div></details>`:""}</div><button class="rouletteBtn" onclick="startRoulette()">다시 뽑기</button></div>`;scrollRouletteIntoView();}
function renderResultsList(){if(!currentResults.length){resultsEl.innerHTML=`<div class="card">조건에 맞는 역이 없습니다.</div>`;return;}resultsEl.innerHTML=currentResults.map(r=>{const k=keyOf(r),ex=isExcluded(r),ch=selectedKeys.has(k)&&!ex?"checked":"",reg=regionOf(r.to_station);return `<div class="card ${ex?"excludedCard":""}"><div class="checkRow"><input type="checkbox" ${ch} ${ex?"disabled":""} onchange="toggleOne('${esc(k)}',this.checked)" /><div><div class="stationName">${esc(r.to_station)} <span class="regionBadge">${esc(reg)}</span></div><div class="meta">환승 ${esc(r.transfer_count)}회 · 탑승 ${esc(r.ride_count)}회</div>${ex?`<div class="excludedNote">랜덤 제외 지역</div>`:""}</div><div class="mins">${esc(r.duration_minutes)}분</div></div><div class="path">${esc(r.path)}</div>${r.legs?`<details><summary>상세 경로</summary><div class="legs">${esc(r.legs)}</div></details>`:""}</div>`;}).join("");}
function render(data){currentResults=data.results||[];selectedKeys=new Set(currentResults.map(keyOf));const trainText=data.excluded_train_types?.length?` · 제외: ${data.excluded_train_types.join(", ")}`:"";statusEl.textContent=`${data.from_station}에서 ${data.minutes}분 이내${trainText}: ${currentResults.length}개 역`;renderRandomPrompt();renderResultsList();}
async function search(){stopTimers();randomArea.innerHTML="";const from=stationInput.value.trim();if(!from){statusEl.innerHTML=`<div class="err">출발역을 입력하세요.</div>`;return;}if(allStations.length&&!allStations.includes(from)){const m=allStations.filter(s=>s.includes(from)).slice(0,5);statusEl.innerHTML=`<div class="err">역 목록에 없는 출발역입니다.${esc(m.length?` 혹시 ${m.join(", ")} 중 하나인가요?`:"")}</div>`;return;}const params=new URLSearchParams({from_station:from,minutes:minutesEl.value||"180",max_transfer:transferEl.value||"2",excluded_train_types:[...excludedTrainTypes].join(",")});statusEl.textContent="검색 중...";resultsEl.innerHTML="";try{const res=await fetch(`/api/search?${params.toString()}`);const data=await res.json();if(data.error)throw new Error(data.error);render(data);}catch(e){statusEl.innerHTML=`<div class="err">${esc(e.message)}</div>`;}}
btn.addEventListener("click",search);stationInput.addEventListener("keydown",e=>{if(e.key==="Enter")search();});if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});}loadStations();
</script>
</body></html>
